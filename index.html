<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>적립 투자 계산기 (연 적립 증가 + CAGR)</title>

  <style>
    :root{
      --bg:#0f172a;
      --line:rgba(255,255,255,.14);
      --text:#eaf1ff;
      --muted:#a9b6d6;
      --radius:18px;
      --shadow:0 14px 40px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,var(--bg),#070b16 75%);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{max-width:820px;margin:0 auto;padding:20px 14px 40px}
    h1{margin:0 0 6px;font-size:20px;letter-spacing:-.2px}
    .sub{margin:0 0 14px;color:var(--muted);font-size:13px;line-height:1.4}

    .panel{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .hd{padding:14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.02)}
    .hd .k{color:var(--muted);font-size:12px;margin:0 0 6px}
    .hd .t{margin:0;font-size:15px}
    .bd{padding:12px 14px 14px}

    .field{
      background:rgba(0,0,0,.22);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      margin-bottom:10px;
    }
    .field label{
      display:flex;justify-content:space-between;gap:10px;
      color:var(--muted);font-size:12px;margin-bottom:8px
    }
    .field input{
      width:100%;
      border:0;outline:0;
      background:transparent;
      color:var(--text);
      font-size:18px;
      font-weight:800;
      letter-spacing:.2px;
      padding:4px 2px;
    }
    .hint{color:var(--muted);font-size:12px;line-height:1.45;margin-top:6px}

    .btn{
      margin-top:10px;
      display:flex;gap:10px;flex-wrap:wrap
    }
    button{
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
    }
    button:hover{border-color:rgba(255,255,255,.22)}
    button.primary{background:rgba(255,255,255,.08)}

    .stats{
      display:grid;
      gap:10px;
      margin-top:14px;
    }
    @media (min-width: 560px){ .stats{grid-template-columns:1fr 1fr} }

    .stat{
      background:rgba(0,0,0,.22);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .stat .t{color:var(--muted);font-size:12px;margin-bottom:6px}
    .stat .v{font-size:20px;font-weight:900;letter-spacing:-.2px}
    .stat .s{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.35}

    .note{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.45}
    code{color:#cfe0ff}
  </style>
</head>

<body>
  <div class="wrap">
    <h1>적립 투자 계산기 </h1>
    <p class="sub">
      
    </p>

    <section class="panel">
      <div class="hd">
        
      </div>

      <div class="bd">
        <div class="field">
          <label>
            <span>월 적립액(원천징수 100% or 120% - 80% 값)</span>
            <span>원</span>
          </label>
          <input id="monthlySaving" type="text" inputmode="numeric" autocomplete="off" value="200,000">
          <div class="hint">예: 200,000 (입력 중 콤마 자동)</div>
        </div>

        <div class="field">
          <label>
            <span>연봉상승률 (연 적립 증가율)</span>
            <span>%</span>
          </label>
          <input id="annualIncrease" type="text" inputmode="decimal" autocomplete="off" value="5.5">
          <div class="hint">예: 5.5</div>
        </div>

        <div class="field">
          <label>
            <span>연평균 수익률</span>
            <span>%</span>
          </label>
          <input id="cagr" type="text" inputmode="decimal" autocomplete="off" value="10">
          <div class="hint">예: 10</div>
        </div>

        <div class="field" style="margin-bottom:0;">
          <label>
            <span>투자 기간</span>
            <span>년</span>
          </label>
          <input id="years" type="text" inputmode="numeric" autocomplete="off" value="10">
          <div class="hint">예: 10</div>
        </div>

        <div class="btn">
          <button class="primary" id="recalcBtn">계산/갱신</button>
          <button id="resetBtn">기본값</button>
        </div>

        <div class="stats">
          <div class="stat">
            <div class="t">최종 자산</div>
            <div class="v" id="finalAsset">-</div>
            
          </div>

          <div class="stat">
            <div class="t">총 납입 원금</div>
            <div class="v" id="principal">-</div>
            
          </div>
        </div>

        <div class="note" id="formulaNote"></div>
      </div>
    </section>
  </div>

  <script>
    // ---------- Formatting helpers ----------
    const fmtKRW = (n) => {
      if (!isFinite(n)) return "-";
      const rounded = Math.round(n);
      return rounded.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + "원";
    };

    // 정수 파싱: "200,000" -> 200000
    const parseIntLoose = (s) => {
      const cleaned = (s ?? "").toString().replace(/[^\d]/g, "");
      return cleaned ? Number(cleaned) : 0;
    };

    // 소수/퍼센트 파싱: "5.5" / "5,5" / "5.5%" -> 5.5
    const parseFloatLoose = (s) => {
      const cleaned = (s ?? "")
        .toString()
        .replace(",", ".")
        .replace(/[^0-9.]/g, "");
      if (!cleaned) return 0;
      const parts = cleaned.split(".");
      const safe = parts.length <= 2 ? cleaned : (parts[0] + "." + parts.slice(1).join(""));
      return Number(safe) || 0;
    };

    // 입력 중 콤마 적용(정수 입력용)
    const formatIntegerInput = (el) => {
      const n = parseIntLoose(el.value);
      el.value = n ? n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") : "";
    };

    // ---------- Calculation (same as given Python) ----------
    function calculate({ monthlySaving, annualIncreasePct, cagrPct, years }) {
      const annual_increase_rate = annualIncreasePct / 100;
      const cagr = cagrPct / 100;
      const months_in_year = 12;

      let total_asset = 0;
      let principal = 0;

      for (let year = 0; year < years; year++) {
        const current_monthly_saving = monthlySaving * Math.pow(1 + annual_increase_rate, year);
        const annual_saving = current_monthly_saving * months_in_year;

        principal += annual_saving;

        // python: total_asset = (total_asset + annual_saving) * (1 + cagr)
        total_asset = (total_asset + annual_saving) * (1 + cagr);
      }

      return { total_asset, principal };
    }

    // ---------- UI wiring ----------
    const $monthlySaving = document.getElementById("monthlySaving");
    const $annualIncrease = document.getElementById("annualIncrease");
    const $cagr = document.getElementById("cagr");
    const $years = document.getElementById("years");

    const $finalAsset = document.getElementById("finalAsset");
    const $principal = document.getElementById("principal");
    const $formulaNote = document.getElementById("formulaNote");

    // 포커스/클릭 시 항상 지우기
    [$monthlySaving, $annualIncrease, $cagr, $years].forEach(el => {
      el.addEventListener("focus", () => { el.value = ""; });
      el.addEventListener("click", () => { el.value = ""; });
    });

    // 월 적립액: 입력 중 콤마 자동 + 즉시 재계산
    $monthlySaving.addEventListener("input", () => {
      formatIntegerInput($monthlySaving);
      recalc();
    });

    // years: 정수만 + 즉시 재계산
    $years.addEventListener("input", () => {
      const n = parseIntLoose($years.value);
      $years.value = n ? String(n) : "";
      recalc();
    });

    // 퍼센트 입력: 즉시 재계산
    [$annualIncrease, $cagr].forEach(el => {
      el.addEventListener("input", () => recalc());
    });

    document.getElementById("recalcBtn").addEventListener("click", recalc);

    document.getElementById("resetBtn").addEventListener("click", () => {
      $monthlySaving.value = "200,000";
      $annualIncrease.value = "5.5";
      $cagr.value = "10";
      $years.value = "10";
      recalc();
    });

    function recalc(){
      const monthlySaving = parseIntLoose($monthlySaving.value);
      const annualIncreasePct = parseFloatLoose($annualIncrease.value);
      const cagrPct = parseFloatLoose($cagr.value);
      const years = Math.max(0, parseIntLoose($years.value));

      const { total_asset, principal } =
        calculate({ monthlySaving, annualIncreasePct, cagrPct, years });

      $finalAsset.textContent = fmtKRW(total_asset);
      $principal.textContent = fmtKRW(principal);

      ;
    }

    // initial render
    recalc();
  </script>
</body>
</html>
